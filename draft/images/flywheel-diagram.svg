<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 660" width="100%" height="100%">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>

    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d2a8ff"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d29922"/>
    </marker>

    <style>
      @keyframes dashFlow {
        from { stroke-dashoffset: 240; }
        to   { stroke-dashoffset: 0; }
      }
      .flow { stroke-dasharray: 10 6; animation: dashFlow 3s linear infinite; }
      @keyframes hubPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.7; }
      }
      .hub-ring { animation: hubPulse 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle"
        font-family="'Segoe UI','Trebuchet MS',sans-serif"
        font-size="20" font-weight="bold" fill="#c9d1d9">継続的改善ループ</text>
  <text x="350" y="55" text-anchor="middle"
        font-family="'Segoe UI',sans-serif"
        font-size="12" fill="#8b949e">使うほど、DayTrace が育つ</text>

  <!-- ───── ARC ARROWS (bg layer, gray) ───── -->
  <!-- N1 → N2 -->
  <path d="M 430,188 A 195,195 0 0,1 520,314"
        fill="none" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
  <!-- N2 → N3 -->
  <path d="M 520,386 A 195,195 0 0,1 430,474"
        fill="none" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
  <!-- N3 → N4 -->
  <path d="M 270,510 A 195,195 0 0,1 179,386"
        fill="none" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
  <!-- N4 → N1 -->
  <path d="M 179,314 A 195,195 0 0,1 270,192"
        fill="none" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>

  <!-- ───── ARC ARROWS (animated color layer) ───── -->
  <!-- N1 → N2 : blue -->
  <path d="M 430,188 A 195,195 0 0,1 520,314"
        fill="none" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"
        marker-end="url(#arr-blue)" class="flow"/>
  <!-- N2 → N3 : purple -->
  <path d="M 520,386 A 195,195 0 0,1 430,474"
        fill="none" stroke="#d2a8ff" stroke-width="3" stroke-linecap="round"
        marker-end="url(#arr-purple)" class="flow"/>
  <!-- N3 → N4 : green -->
  <path d="M 270,510 A 195,195 0 0,1 179,386"
        fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round"
        marker-end="url(#arr-green)" class="flow"/>
  <!-- N4 → N1 : amber -->
  <path d="M 179,314 A 195,195 0 0,1 270,192"
        fill="none" stroke="#d29922" stroke-width="3" stroke-linecap="round"
        marker-end="url(#arr-amber)" class="flow"/>

  <!-- ───── CENTER HUB ───── -->
  <circle cx="350" cy="350" r="68" fill="#161b22" stroke="#484f58" stroke-width="1.5" class="hub-ring"/>
  <circle cx="350" cy="350" r="58" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="344" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#58a6ff">DayTrace</text>
  <text x="350" y="362" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">継続的改善</text>

  <!-- ───── NODE 1 (top) : 日々の作業 ───── -->
  <rect x="268" y="152" width="164" height="74" rx="10"
        fill="#161b22" stroke="#484f58" stroke-width="2"/>
  <rect x="268" y="152" width="4"   height="74" rx="2" fill="#484f58"/>
  <text x="356" y="178" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#c9d1d9">① 日々の作業</text>
  <text x="356" y="196" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">コードを書き、調べ、議論する</text>
  <text x="356" y="214" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#484f58">Reality</text>

  <!-- ───── NODE 2 (right) : 証跡の抽出 ───── -->
  <rect x="433" y="313" width="178" height="74" rx="10"
        fill="#1a2d3f" stroke="#58a6ff" stroke-width="2"/>
  <rect x="433" y="313" width="4"   height="74" rx="2" fill="#58a6ff"/>
  <text x="524" y="339" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#58a6ff">② 証跡の蓄積・抽出</text>
  <text x="524" y="357" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">daytrace-session</text>
  <text x="524" y="373" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">skill-miner</text>

  <!-- ───── NODE 3 (bottom) : 人間の承認 ───── -->
  <rect x="268" y="472" width="164" height="74" rx="10"
        fill="#2d1f3f" stroke="#d2a8ff" stroke-width="2"/>
  <rect x="268" y="472" width="4"   height="74" rx="2" fill="#d2a8ff"/>
  <text x="356" y="498" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#d2a8ff">③ 人間の承認</text>
  <text x="356" y="516" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">提案を確認・採用を決定</text>
  <text x="356" y="534" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e40c9">Judge / Audit</text>

  <!-- ───── NODE 4 (left) : 環境のアップデート ───── -->
  <rect x="89" y="313" width="178" height="74" rx="10"
        fill="#1a3020" stroke="#3fb950" stroke-width="2"/>
  <rect x="89" y="313" width="4"   height="74" rx="2" fill="#3fb950"/>
  <text x="180" y="339" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#3fb950">④ 環境のアップデート</text>
  <text x="180" y="357" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">skill-applier で</text>
  <text x="180" y="373" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">CLAUDE.md / skill / hook に反映</text>

  <!-- ───── BOTTOM CAPTION ───── -->
  <text x="350" y="630" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="12" fill="#8b949e">使い続けるほど反復作業が自動化され、開発環境が自分仕様に育っていく</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420" width="100%" height="100%" style="background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <defs>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="layerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.8"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <rect x="20" y="20" width="180" height="380" rx="12" fill="url(#layerGradient)" stroke="#cbd5e1" stroke-width="1"/>
  <text x="110" y="45" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle" letter-spacing="1">Reality Layer</text>
  <text x="110" y="60" font-size="11" fill="#94a3b8" text-anchor="middle">バラバラな事実・生データ</text>

  <rect x="235" y="20" width="360" height="380" rx="12" fill="url(#layerGradient)" stroke="#cbd5e1" stroke-width="1"/>
  <text x="415" y="45" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle" letter-spacing="1">Semantic Layer</text>
  <text x="415" y="60" font-size="11" fill="#94a3b8" text-anchor="middle">意味づけ・文脈の統合</text>

  <rect x="630" y="20" width="200" height="380" rx="12" fill="url(#layerGradient)" stroke="#cbd5e1" stroke-width="1"/>
  <text x="730" y="45" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle" letter-spacing="1">Inference / Decision</text>
  <text x="730" y="60" font-size="11" fill="#94a3b8" text-anchor="middle">推論・意思決定の支援</text>


  <g fill="none" stroke-width="3">
    <path d="M 170 100 C 230 100, 270 210, 320 210" stroke="#cbd5e1" marker-end="url(#arrowhead)"/>
    <path d="M 170 160 C 230 160, 270 210, 320 210" stroke="#cbd5e1" marker-end="url(#arrowhead)"/>
    <path d="M 170 220 C 230 220, 270 210, 320 210" stroke="#cbd5e1" marker-end="url(#arrowhead)"/>
    <path d="M 170 280 C 230 280, 270 210, 320 210" stroke="#cbd5e1" marker-end="url(#arrowhead)"/>
    <path d="M 170 340 C 230 340, 270 210, 320 210" stroke="#cbd5e1" marker-end="url(#arrowhead)"/>

    <path d="M 510 210 C 570 210, 590 140, 650 140" stroke="#cbd5e1" marker-end="url(#arrowhead)"/>
    <path d="M 510 210 C 570 210, 590 220, 650 220" stroke="#cbd5e1" marker-end="url(#arrowhead)"/>
    <path d="M 510 210 C 570 210, 590 300, 650 300" stroke="#cbd5e1" marker-end="url(#arrowhead)"/>

    <g stroke="#3b82f6" stroke-dasharray="6 8" stroke-width="2">
      <path d="M 170 100 C 230 100, 270 210, 320 210">
        <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.6s" repeatCount="indefinite" />
      </path>
      <path d="M 170 160 C 230 160, 270 210, 320 210">
        <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.8s" repeatCount="indefinite" />
      </path>
      <path d="M 170 220 C 230 220, 270 210, 320 210">
        <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.7s" repeatCount="indefinite" />
      </path>
      <path d="M 170 280 C 230 280, 270 210, 320 210">
        <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.9s" repeatCount="indefinite" />
      </path>
      <path d="M 170 340 C 230 340, 270 210, 320 210">
        <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.65s" repeatCount="indefinite" />
      </path>
    </g>

    <g stroke="#10b981" stroke-dasharray="6 8" stroke-width="3">
      <path d="M 510 210 C 570 210, 590 140, 650 140">
        <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.7s" repeatCount="indefinite" />
      </path>
      <path d="M 510 210 C 570 210, 590 220, 650 220">
        <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.6s" repeatCount="indefinite" />
      </path>
      <path d="M 510 210 C 570 210, 590 300, 650 300">
        <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.8s" repeatCount="indefinite" />
      </path>
    </g>
  </g>


  <g filter="url(#shadow)">
    <rect x="40" y="80" width="130" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="60" cy="100" r="6" fill="#f97316"/>
    <text x="75" y="105" font-size="13" font-weight="bold" fill="#334155">Git Commits</text>

    <rect x="40" y="140" width="130" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="60" cy="160" r="6" fill="#a855f7"/>
    <text x="75" y="165" font-size="13" font-weight="bold" fill="#334155">Claude Code</text>

    <rect x="40" y="200" width="130" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="60" cy="220" r="6" fill="#06b6d4"/>
    <text x="75" y="225" font-size="13" font-weight="bold" fill="#334155">Codex (CLI)</text>

    <rect x="40" y="260" width="130" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="60" cy="280" r="6" fill="#ef4444"/>
    <text x="75" y="285" font-size="13" font-weight="bold" fill="#334155">Chrome History</text>

    <rect x="40" y="320" width="130" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="60" cy="340" r="6" fill="#84cc16"/>
    <text x="75" y="345" font-size="13" font-weight="bold" fill="#334155">File Changes</text>
  </g>


  <g filter="url(#shadow)">
    <rect x="320" y="130" width="190" height="160" rx="16" fill="url(#coreGradient)"/>
    
    <rect x="322" y="132" width="186" height="156" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2"/>

    <text x="415" y="165" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">DayTrace Core</text>
    
    <rect x="345" y="180" width="140" height="24" rx="12" fill="#1e1b4b" fill-opacity="0.4"/>
    <text x="415" y="196" font-size="12" font-family="monospace" fill="#a5b4fc" text-anchor="middle">/daytrace-session</text>

    <text x="415" y="235" font-size="12" font-weight="bold" fill="#e0e7ff" text-anchor="middle">パターンの抽出</text>
    <text x="415" y="255" font-size="12" font-weight="bold" fill="#e0e7ff" text-anchor="middle">コンテキストの統合</text>
  </g>


  <g filter="url(#shadow)">
    <rect x="650" y="115" width="160" height="50" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <circle cx="670" cy="140" r="10" fill="#d1fae5"/>
    <path d="M 666 140 L 669 143 L 674 136" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="690" y="136" font-size="14" font-weight="bold" fill="#0f766e">Daily Report</text>
    <text x="690" y="152" font-size="11" fill="#64748b">（日報・活動サマリ）</text>

    <rect x="650" y="195" width="160" height="50" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <circle cx="670" cy="220" r="10" fill="#d1fae5"/>
    <path d="M 666 220 L 669 223 L 674 213" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="690" y="216" font-size="14" font-weight="bold" fill="#0f766e">Post Draft</text>
    <text x="690" y="232" font-size="11" fill="#64748b">（記事・ドキュメント案）</text>

    <rect x="650" y="275" width="160" height="50" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="670" cy="300" r="10" fill="#ede9fe"/>
    <path d="M 667 296 L 673 304 M 667 304 L 673 296" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-linecap="round"/> <text x="690" y="296" font-size="14" font-weight="bold" fill="#6d28d9">Skill Proposal</text>
    <text x="690" y="312" font-size="11" fill="#64748b">（AIへのオンボーディング）</text>
  </g>

</svg>
